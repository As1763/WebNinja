<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Preview</title>
</head>
<body>
    <script>
        try {
            // Read content from localStorage set by parent
            const content = localStorage.getItem('task_preview_content');
            if (content) {
                document.open();
                document.write(content);
                document.close();
            } else {
                document.body.innerHTML = '<div style="font-family:sans-serif; padding:20px; color:#666;">Waiting for task content...</div>';
            }
        } catch (e) {
            console.error("Error loading task content:", e);
            document.body.innerHTML = 'Error loading task preview.';
        }
    </script>
</body>
</html>
